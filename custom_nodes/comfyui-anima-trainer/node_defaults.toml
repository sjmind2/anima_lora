# Trainer-node-only training defaults.
#
# These are merged into the daemon training `overrides` (see nodes.py
# `_load_node_defaults`), sitting *below* the explicit UI fields (rank / epochs
# / lr / model) so anything the user types in the node still wins, but *above*
# the gpu-tier hardware overrides (the `gpu` dropdown) and the
# base/preset/method TOMLs. So e.g. `blocks_to_swap` set here overrides whatever
# the gpu tier would pick. They exist to tune the few-image training regime this
# node runs in, without touching the shared `configs/base.toml`.
#
# Edit values here to change the node's training behaviour; no code change
# needed (the file is re-read on every run).


save_every_n_epochs = 999
checkpointing_epochs = 999
log_every_n_steps=1
use_custom_down_autograd = false
blocks_to_swap=0
persistent_data_loader_workers = true
max_data_loader_n_workers=0