# SPD fine-tuning LoRA — trajectory adapter for progressive-resolution inference
# (proposal: docs/proposal/spd_finetune_lora.md, "Case B").
#
# Read by scripts/distill_spd.py — NOT by train.py. Schema is bespoke
# (sections, like turbo.toml). Don't `python tasks.py print-config METHOD=spd`.
#
# Trains a *plain* rank-32 LoRA on one frozen Anima DiT to follow the
# stage-specific straight-line velocity targets of the SPD multi-resolution
# trajectory (§4.3, Eq. 11–14). Output `output/ckpt/anima_spd.safetensors` is a
# normal LoRA — load it through the standard inference path and run with the
# SPD sampler at the *same* schedule (`make exp-test-spd`). The weights are
# shape-agnostic; only the learned behavior is coupled to the schedule below,
# so it is snapshotted into the safetensors metadata (R2).

output_name = "anima_spd"
dit_path = "models/diffusion_models/anima-base-v1.0.safetensors"
data_dir = "post_image_dataset/lora"
output_dir = "output/ckpt"

iterations = 2000
batch_size = 1
seed = 42

[network]
# Paper-faithful plain LoRA (Table 2 used rank-32). NOT the Anima default
# T-LoRA+Ortho+Hydra stack — fewer moving parts for the first falsification,
# and T-LoRA's timestep mask interacts with the per-stage t-routing in ways to
# study separately (proposal "Plain LoRA for v0"). alpha = rank (scale 1.0),
# matching the LoRA-family convention.
rank = 64
alpha = 64
attn_mode = "flash"

# SPD schedule — the segment geometry this LoRA learns and MUST infer with.
# Ascending resolution scales (last must be 1.0) and the σ thresholds at which
# the sampler spectral-expands to the next stage (len = len(stages)-1).
# v0 = the bench's single-late knee (SamplerSPEED `[0.5, 0.5, 0.99, 0.5]`):
# run t∈(0.5,1] at half resolution, expand at σ≈0.5, finish full-res.
[schedule]
stages = [0.5, 1.0]
transition_sigmas = [0.5]
label = "single_0.5_sigma0.5"
# Optional R2 robustness: jitter the transition σ by ±this (absolute, uniform)
# each step so the segment geometry is learned as a band, not a point. 0 = off.
sigma_jitter = 0.0

# On-policy teacher-distillation tail (proposal.md Idea 2). Trains the full-res
# tail on the handoff state the adapter-on prefix actually rolls to (then
# spectral-expanded), distilling toward the FROZEN BASE model's own full-res /
# full-step gold sample for the same ε+prompt: `(x̃ − x0_teacher)/σ̃`.
#
# This replaces the original `(x̃ − x0_dataset)/σ̃` target, which was wrong by
# construction: a fresh-ε prefix rollout lands on *a* prompt-consistent sample,
# never on the specific dataset latent (Phase-0 probe rel_x0_on ≈ 0.83→0.98), so
# regressing toward x0_dataset bent every trajectory toward one arbitrary latent
# → mean-regression → blurry samples. The frozen-base teacher, run the expensive
# seam-free way from the *same* seed, is the trusted answer at the visited state
# (DAgger expert); the shared seed keeps its layout aligned with the cheap path's.
# v0: 2-stage only. Works with --torch_compile (plain inductor: teacher/rollout/
# tail are static shapes); not with --compile_inductor_mode reduce-overhead
# (CUDAGraphs span the eval/grad + LoRA on/off toggles).
[onpolicy]
# Fraction of steps that use the on-policy teacher tail; the rest stay the analytic
# backbone (which still trains the prefix — the on-policy rollout is no_grad). 0 =
# analytic-only. MIX — one LoRA can't be frozen by module, so 1.0 lets the prefix
# drift untrained. NOTE: prefer warming up analytic-only before enabling this, so
# the prefix rollout is sane when the teacher tail starts trusting its handoff state.
ratio = 0.0
# Site of supervision: 'entry' = the handoff σ̃ only (attacks the seam, cheapest);
# 'full' = DAgger across the tail band (roll the tail no_grad to a random σ in
# [sigma_floor, σ̃] and supervise there — needed to claim the high-res stage can
# be shortened).
tail_band = "entry"
rollout_steps = 16      # Euler steps for the prefix rollout (coarser than infer is fine)
teacher_steps = 24      # Euler steps for the frozen-base gold rollout (≥ deployment grid)
sigma_floor = 0.1       # lower σ clamp for 'full' band (caps the (x−x0_teacher)/σ variance)
flow_shift = 1.0        # σ-schedule shift for the rollout (matches inference)

[optim]
lr = 5e-5
weight_decay = 0.0
grad_clip = 1.0
warmup = 0.02            # ratio of iterations (int >=1 → absolute steps)

[io]
save_every = 1000
log_interval = 10
log_dir = "output/logs/spd"
