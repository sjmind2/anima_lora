# APEX combined-3F — c-shift + t-shift self-adversarial distillation.
#
# Same 3-forward APEX recipe as apex.toml (shipped baseline), with one extra
# perturbation in Forward 2: query v_fake at (x_t, t + Δt, c_fake) instead of
# (x_t, t, c_fake). c-shift and t-shift are roughly orthogonal in output-delta
# space (cross-strategy cosine median ≈ 0 at Δt=−0.05), so the combined
# perturbation adds non-redundant supervision at zero extra compute and zero
# extra memory — the only change is one scalar add inside Forward 2.
#
# The case for combined-3F is *architectural*, not probe-measured. The
# 200-step probe (bench/apex/probe_temporal_train.py, 2026-05-08) showed
# combined-2F and temporal-2F descend L_mix at indistinguishable rates;
# orthogonality at probe scale didn't translate to faster supervision. The
# reasons to still lead with this lane:
#   - Strict superset of shipped APEX: retains L_fake (fake-trajectory
#     self-distillation, the part of APEX that actually does work since
#     (a, b) drift <3% in 7k steps) AND adds the orthogonal t-shift signal.
#   - Same compute as shipped APEX (3 fwd/step), same memory profile.
#   - Theoretical purity unchanged (Section 3.3 Fisher-divergence-aligned
#     gradient interpretation carries over).
#
# See docs/experimental/apex-0508.md for the full 3-way A/B framing
# (baseline / combined-3F / temporal-2F).
#
# USAGE:
#   make exp-apex-combined                # default preset
#   python tasks.py exp-apex-combined     # cross-platform
#
# Warm-start is mandatory (same as shipped APEX). Cold-start failure mode is
# unchanged — ConditionShift + L_fake are both intact.

output_name = "anima_apex_combined"
logging_dir = "output/logs"
log_with = "tensorboard"

# Warm-start identical to apex.toml — combined-3F doesn't change cold-start
# economics, just Forward 2's t.
network_weights = "output/ckpt/anima-tlora-0507-12.safetensors"
dim_from_weights = true

learning_rate = 1e-4
max_train_epochs = 3
save_every_n_epochs = 3
checkpointing_epochs = 3

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.0

weighting_scheme = "apex_omega"
apex_anchor_ratio = 0.05

# APEX hyperparameters — same as shipped baseline.
apex_lambda = 0.5
apex_lambda_c = 1.0
apex_lambda_p = 1.0
apex_loss_form = "mix"

apex_warmup_ratio = 0.0
apex_rampup_ratio = 0.10

# ConditionShift — same as shipped APEX (sign-flip diag, init_b=0).
# Visibility settled in apex-0506.md; not revisited here.
apex_condition_shift_mode = "diag"
apex_condition_shift_init_a = -0.5
apex_condition_shift_init_b = 0.0
apex_shift_lr_scale = 1.0

# Combined-3F — the only knob that differs from apex.toml.
#
# Δt = −0.05: cross-strategy cosine showed `cond_diag × dt_neg_small`
# median ≈ 0 (cleaner orthogonal complement than `dt_pos_small`'s +0.31),
# and −Δt avoids the upper-clamp artifact at t=0.98 that degenerated ~5%
# of probe steps under +Δt. Magnitude ±0.05 puts |Δv_fake| in cond_diag's
# MSE band (0.80–0.97×); doubling Δt to ±0.20 reaches 8–10× cond_diag
# but SNR collapses to 12–15 (perturbation comparable to velocity) —
# don't go bigger without re-probing.
#
# Watch apex/dt_clamp_frac in TB: should stay near 0 for Δt=−0.05 since
# t ~ U(0.02, 0.98) puts only ~5% of mass in [0.02, 0.07].
apex_dt = -0.05

blocks_to_swap = 0
