# LOHA (Low-Rank Hadamard Product adaptation).
# ΔW = (A@B) ⊙ (C@D) × scale. Effective rank = dim² with 2× parameters.
# scale = alpha / dim. Recommended scale range: 0.1–0.5.

network_type = "loha"
network_dim = 32
network_alpha = 16
conv_dim = 4
conv_alpha = 1
learning_rate = 1e-4
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_tucker = true
scale_weight_norms = 1.0

