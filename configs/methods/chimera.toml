# ChimeraHydra — dual-pool additive routing for timestep-aware MoE.
#
# Proposal: docs/proposal/chimera_hydra.md
# Module:   networks/lora_modules/chimera.py
# Spec:     networks/__init__.py::NETWORK_REGISTRY["chimera_hydra"]
#
# Two pools of B-heads share one A per adapted Linear:
#   • content pool (K_c=3) routed by the per-layer rank-R router on pooled lx.
#   • freq    pool (K_f=3) routed by the network-level FreqRouter on
#                          concat(FEI(z_t), sinusoidal-σ-features).
# Pool outputs are added (no multiplicative gate, no σ-band overlap mask).
# Specialization is enforced by router-input separation — the content router
# can't see σ; the freq router can't see pooled text features.
#
# Single phase: both pools, both routers, and shared A train jointly under
# the denoise loss + per-pool balance loss. T-LoRA's mask is applied to
# the content branch only (the freq branch keeps full rank at every t).

network_alpha = 32
network_dim = 32

learning_rate = 5e-5
max_train_epochs = 6
save_every_n_epochs = 6
checkpointing_epochs = 6

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

# CMMD val (PE-Core MMD²) is the primary val signal.
# use_cmmd = true

logging_dir = "output/logs"
log_with = "tensorboard"

output_name = "anima_hydra"
path_pattern = "ama_mitsuki/*|channel_(caststation)/*|sweetonedollar/*"

use_ortho = true
use_timestep_mask = true
min_rank = 32
alpha_rank_scale = 1.0
channel_scaling_alpha = 0.5

# -------------
# ChimeraHydra activation. The three-axis routing fields
# (use_moe_style / route_per_layer / router_source) are auto-pinned to
# ("shared_A", true, "input") by LoRANetworkCfg.from_kwargs when
# use_chimera_hydra=true — they get stamped into save metadata so the
# loader can re-instantiate the chimera without a parallel discrimination
# path.

use_chimera_hydra = true
num_experts_content = 6
num_experts_freq = 2

# Outer balance multiplier is 1.0 so the per-pool weights below are the
# only scalars on the balance loss. Default per-pool weights match the
# OrthoHydra production value (~2e-5, see
# [[project_hydra_balance_weight_ceiling]]).
#
# Warmup is asymmetric on the chimera path: only the per-Linear CONTENT
# router gates through ``balance_loss_warmup_ratio``. The FREQ router
# bypasses warmup entirely — its FEI input + ``freq_router_init_std``
# break symmetry from step 0, so its load-balance pressure can fire
# immediately without pinning the router to uniform.

balance_loss_warmup_ratio = 0.1
balance_loss_weight = 1.0
balance_w_content = 1e-6
balance_w_freq = 5e-7
network_content_router_lr_scale = 10.0
network_freq_router_lr_scale = 5.0

content_router_source = "crossattn_emb"
content_router_init_std = 0.001      # non-zero (uniform would be a fixed point)
content_router_layer_norm = true   # parameterless LN on the pooled input

# FreqRouter input. FEI = 2-band simplex (e_low, e_high). σ-features
# disabled by default (sigma_feature_dim = 0), so the FreqRouter input
# dim = 2. Flip sigma_feature_dim > 0 to add sinusoidal σ features (same
# functional form as the DiT t_embedder); the proposal targets "F ≈ 32".

fei_feature_dim = 2
fei_sigma_low_div = 4.0
sigma_feature_dim = 16
freq_router_layer_norm = true
freq_router_init_std = 0.1

# Routing scope. Every Linear matched by this regex becomes a chimera
# leaf; non-matching layers fall back to OrthoLoRA (single-pool Cayley,
# no router). Same default as the other hydra variants.
# router_targets = ".*(output_proj|mlp\\.layer[12])$"
router_targets = ".*(cross_attn\\.output_proj|mlp\\.layer[12])$"
# output_name = "anima_chimera-0521"
[[datasets]]
validation_split_num = 0
# -------------
# Optional: global content router. Default is the paper-faithful per-Linear
# softmax over pooled rank-R lx_c (`self.router` on every chimera module).
# Flipping `content_router_source = "crossattn_emb"` swaps that for a single
# network-level ContentRouter fed by pooled crossattn_emb (post-LLM-adapter
# T5-space text features). π_c then routes from a global "caption regime"
# axis instead of a per-site decision — analogous to FeRA on the freq pool.
# Per-Linear `router.weight` / `router.bias` keys are absent from the
# checkpoint in that case; FreqRouter contract is unchanged.
#
# Tradeoffs:
#  • Faster convergence on the content axis (one router updated jointly
#    by all chimera Linears) and fewer params on disk.
#  • Loses per-site specialization (cross_attn.output_proj vs mlp.layer1
#    can no longer pick different K_c partitions).
#  • Router-collapse risk is correlated across every chimera layer (same
#    failure mode as FeRA's GlobalRouter — see networks/CLAUDE.md).
#  • LR-sensitive. Start with the same scale FreqRouter uses (10×).
#

# -------------
# VR-loss composition is not gated. It modifies what shared A learns, so
# co-train compat is unknown — sanity-check at bench before stacking on
# top of chimera.
