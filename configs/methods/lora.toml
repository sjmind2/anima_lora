# -------------
# Variance-reduced FM loss (AsymFlow §5.2, arXiv:2605.12964). One extra
# no-grad forward per step on the FEI-low-passed latent, with an online
# control-variate λ. The control-variate forward reuses the trainable DiT
# with adapter multiplier=0 (equivalent to a frozen base DiT for LoRA-family
# runs), so there is no extra model copy in VRAM — only ~+40% step compute.
# See bench/fm_vr_headroom/proposal.md.
# vr_loss_weight = 1.0
# vr_fei_sigma_low_div = 4.0
