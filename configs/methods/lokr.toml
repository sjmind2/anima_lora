# LOKR (Low-Rank Kronecker Product adaptation).
# Factorizes weight dimensions and uses Kronecker product for structured high-rank.

network_type = "lokr"
network_dim = 8
network_alpha = 8
learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

decompose_both = true
lokr_factor = -1
use_tucker = true

# full_matrix = false
