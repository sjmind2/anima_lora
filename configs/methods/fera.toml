# fera.toml — Author-faithful FeRA (Yin et al., arXiv:2511.17979).
#
# Distinct from the FEI-router-on-Hydra variant lives in
# ``networks/lora_modules/hydra.py`` + ``library/runtime/fei.py``:
#
#   * Each expert has its own independent (lora_down, lora_up) — **no**
#     shared-A pooling. Matches FeRA/fera/layer.py.
#   * **One global router** consumes z_t's FEI and emits one
#     (B, num_experts) gate that every adapted Linear reuses for the step.
#   * Targets all matched Linears (attn projections + MLP) — wider scope
#     than the FEI-on-Hydra variant, which is regex-restricted to MLP.
#
# Bench probes (bench/fera/results/20260512-*) collapsed the paper's
# 3-band design to **2 bands** on Anima flow-matching latents (mid band
# carried <8% energy). Default below is num_bands=3 for author fidelity;
# flip to 2 to use the Anima-validated split. See [[project_fera_probe_2band_decision]].
#
# σ_low scaling follows the bench-validated rule
# σ_low = min(H_lat, W_lat) / fei_sigma_low_div (default 8.0), NOT the
# paper's pixel-domain constant min(H, W)/128. The latter is dataset-
# specific to SD2 at 512×512.
#
# FECL (frequency-energy consistency loss): exposed on the network class
# but **not** wired into train.py's loss composer. Enabling it requires
# a second no-grad DiT forward per step (2× cost) — opt-in via a follow-up
# bench. Default fera_fecl_weight = 0.0 keeps it off.

network_module = "networks.methods.fera"

# Rank / scale per expert. Author paper uses rank=4 across SD2 LoRA targets.
network_dim = 8
network_alpha = 8

# Method-specific kwargs go through ``network_args`` (the convention every
# ``networks/methods/*`` module follows — postfix, easycontrol, soft_tokens).
# Top-level TOML keys only work for entries in
# ``networks/__init__.py::SHARED_KWARG_FLAGS`` or argparse flags, and the
# FeRA kwargs are neither.
#
#   fera_num_experts     : independent expert count per FeRALinear (paper: 3)
#   fera_num_bands       : FEI band count. 3 = paper. Drop to 2 for the
#                          Anima-validated split (see [[project_fera_probe_2band_decision]]),
#                          but pair that with fera_fecl_weight=0 — at 2 bands
#                          FECL degenerates to a pure magnitude regularizer.
#   fera_router_tau      : softmax temperature on the global router.
#   fera_router_hidden   : router MLP hidden width.
#   fera_fecl_weight     : aux loss weight. Paper-strength 0.1 activates the
#                          base-pass forward in get_noise_pred_and_target + the
#                          ``fera_fecl`` composer term (2× per-step forward
#                          cost). Set 0 to disable.
#   fera_target_modules  : Anima Linear naming — self-attn qkv_proj,
#                          cross-attn q_proj + kv_proj, attn output_proj,
#                          MLP layer1/2.
network_args = [
    "fera_num_experts=4",
    "fera_num_bands=2",
    "fera_router_tau=0.7",
    "fera_router_hidden=64",
    "fera_fecl_weight=0.0",
    "fera_target_modules=.*\\.(qkv_proj|q_proj|kv_proj|output_proj|layer[12])$",
]

# Bucket-adaptive σ_low. 8.0 = bench-validated default across 1024² /
# 832×1248 / 1248×832 mirror buckets (mean |Δ FEI| < 0.02). Same default
# the FEI-on-Hydra variant uses — already a registered top-level kwarg
# via _HYDRA_KWARG_FLAGS, so it stays at top level here.
fei_sigma_low_div = 8.0

# Training schedule — close to author's SD2 paper recipe; tune on bench.
learning_rate = 1e-4
max_train_epochs = 4
save_every_n_epochs = 4
checkpointing_epochs = 4

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

logging_dir = "output/logs"
log_with = "tensorboard"

# compile_mode = "full"
# compile_inductor_mode = "reduce-overhead"

blocks_to_swap=20

