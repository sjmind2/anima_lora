# gui-methods/hydralora_sigma.toml — HydraLoRA + σ-conditional router.
#
# HydraLoRA (shared down + per-expert up heads) with a tiny sinusoidal(σ)→E
# bias MLP per router, letting expert choice vary with denoising timestep.
# Zero-init at the final layer → step-0 identical to base HydraLoRA, σ-
# dependence only emerges if gradients push it. See docs/methods/hydra-lora.md.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

use_moe_style = "shared_A"
route_per_layer = true
router_source = "sigma"
num_experts = 4
balance_loss_weight = 3e-7


router_targets = ".*(mlp\\.layer[12])$"

sigma_feature_dim = 16
per_bucket_balance_weight = 0.3
num_sigma_buckets = 3
# Optional custom σ-bucket edges (length = num_sigma_buckets + 1, monotone
# 0.0 → 1.0). Defaults to uniform linspace when omitted.
# sigma_bucket_boundaries = [0.0, 0.5, 0.8, 1.0]

output_name = "anima_hydra_sigma"

blocks_to_swap = 0

use_cmmd = false

[variant]
family = "hydralora"
label = "HydraLoRA (sigma router)"
description = "Shared-A Hydra with sigma-conditioned per-layer router."
order = 10
