# gui-methods/hydralora_experimental.toml — HydraLoRA + σ-conditional router
# with hard σ-bucket expert partition (experimental).
#
# Same shared-A MoE shape as ``hydralora_sigma.toml``, but with
# ``specialize_experts_by_sigma_buckets = true`` and an explicit bucket-edge
# vector pinning experts to disjoint σ regions. Use when you want hard
# specialization instead of soft σ-conditional routing.

network_dim = 32
network_alpha = 32

learning_rate = 2e-5
max_train_epochs = 4
save_every_n_epochs = 2
checkpointing_epochs = 2

use_shuffled_caption_variants = true
cache_llm_adapter_outputs = true
caption_dropout_rate = 0.1

use_ortho = true

use_timestep_mask = true
min_rank = 1
alpha_rank_scale = 1.0

use_moe_style = "shared_A"
route_per_layer = true
router_source = "sigma"
num_experts = 6
balance_loss_weight = 3e-7


router_targets = ".*(mlp\\.layer[12])$"

sigma_feature_dim = 16
per_bucket_balance_weight = 0.3
num_sigma_buckets = 3

specialize_experts_by_sigma_buckets = true
sigma_bucket_boundaries = [0.0, 0.5, 0.8, 1.0]

output_name = "anima_hydra_experimental"

blocks_to_swap = 0

use_cmmd = false

[variant]
family = "hydralora"
label = "HydraLoRA (sigma + buckets)"
description = "HydraLoRA + hard sigma-bucket expert partition (experimental)."
order = 20
experimental = true
