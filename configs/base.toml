# Shared infrastructure settings — rarely change between experiments.

pretrained_model_name_or_path = "models/diffusion_models/anima-base-v1.0.safetensors"
qwen3 = "models/text_encoders/qwen_3_06b_base.safetensors"
vae = "models/vae/qwen_image_vae.safetensors"

output_dir = "output/ckpt"
output_name = "anima_lora"
save_model_as = "safetensors"

network_module = "networks.lora_anima"
network_train_unet_only = true

# ── Dataset paths ────────────────────────────────────────────────────────
# Top-level scalars so any preset / method can override (the merge chain is
# base.toml → presets.toml[<preset>] → methods/<method>.toml). The dataset
# blueprint subset (below) interpolates `{resized_image_dir}` /
# `{lora_cache_dir}` so editing these keys propagates to training too.
# `tasks.py` preprocess commands also read them via `load_path_overrides`.
source_image_dir = "image_dataset"
resized_image_dir = "post_image_dataset/resized"
lora_cache_dir = "post_image_dataset/lora"
# fnmatch glob applied to each image's path relative to its subset's image_dir.
# `*` (or unset) trains on everything. Use `|` to OR-combine patterns:
#   `char_a/*`           → one subfolder
#   `char_a/*|char_b/*`  → two subfolders
#   `*portrait*`         → any path containing "portrait"
# Same blueprint applies to validation enumeration.
path_pattern = "*"

# Preprocess input filter. When true, scripts/tasks/preprocess.py forwards
# `--min_pixels = min_pixels` to both preprocess/resize_images.py and
# preprocess/cache_text_embeddings.py so under-sized source images never
# enter the resize / VAE / TE caches. Default 500_000 = 0.5MP — matches the
# scripts' own argparse defaults. Set drop_lowres_images = false to keep
# every image regardless of size. Override per-run without editing this file:
#   make preprocess ARGS="--min_pixels 0"        # explicit threshold (wins)
#   make preprocess ARGS="--no_drop_lowres"      # keep every image
#   make preprocess ARGS="--drop_lowres"         # force the configured threshold
drop_lowres_images = true
min_pixels = 500000

optimizer_type = "AdamW"
lr_scheduler = "cosine"
lr_warmup_steps = 0.05   # ratio (<1) → 5% of total steps; warms AdamW before full LR

timestep_sampling = "sigmoid"
discrete_flow_shift = 1.0
mixed_precision = "bf16"

gradient_checkpointing = false
unsloth_offload_checkpointing = false

use_vae_cache = true
use_text_cache = true
skip_cache_check = true
vae_chunk_size = 64
vae_disable_cache = true
masked_loss = true
torch_compile = true
attn_mode = "flash"
save_precision= "bf16"
use_custom_down_autograd = true
log_every_n_steps=2
dataloader_pin_memory = true
persistent_data_loader_workers= true
use_cmmd = false

# ── Dataset config ───────────────────────────────────────────────────────
# Formerly configs/dataset_config.toml. Consumed directly by the dataset
# blueprint generator when no --dataset_config override is passed. The
# `general`/`datasets` top-level sections are skipped by the flat method+preset
# merge chain (see library.train_util._flatten_toml) so they don't pollute the
# argparse namespace.

[general]
caption_extension = '.txt'
keep_tokens = 3

[[datasets]]
batch_size = 1

# validation_split = 0.025
validation_split_num = 0
validation_seed = 42

  [[datasets.subsets]]
  # Templates resolve against top-level path keys (source_image_dir,
  # resized_image_dir, lora_cache_dir) at load time — see
  # library.config.io.load_dataset_config_from_base.
  image_dir = '{resized_image_dir}'
  cache_dir = '{lora_cache_dir}'
  num_repeats = 1
  # Walk subfolders under image_dir. Caches and resized output stay flat in
  # cache_dir / resized_image_dir (stem-keyed filenames), so image stems must
  # be unique across the entire tree — the trainer enforces this and the
  # matching preprocess scripts pass --recursive automatically.
  recursive = true
