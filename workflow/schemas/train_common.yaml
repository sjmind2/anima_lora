type: train_common
label: "训练通用参数"
description: "所有训练方法共享的参数，切换方法时保留"

groups:
  - name: advanced
    label: "高级覆盖"
    collapsed: true
    fields:
      - key: pretrained_model_name_or_path
        type: path
        required: false
        layer: common
        label: "DiT 模型覆盖"
        help: "留空使用全局设置"
      - key: qwen3
        type: path
        required: false
        layer: common
        label: "文本编码器覆盖"
        help: "留空使用全局设置"
      - key: vae
        type: path
        required: false
        layer: common
        label: "VAE 模型覆盖"
        help: "留空使用全局设置"

  - name: training
    label: "训练超参"
    fields:
      - key: learning_rate
        type: float
        required: true
        layer: common
        default: 0.0004
        label: "学习率"
      - key: lr_scheduler
        type: enum
        required: false
        layer: common
        default: "cosine"
        choices: ["cosine", "constant", "constant_with_warmup", "linear", "polynomial"]
        label: "LR 调度器"
      - key: lr_warmup_steps
        type: int
        required: false
        layer: common
        default: 0
        label: "预热步数"
      - key: max_train_epochs
        type: int
        required: true
        layer: common
        label: "最大 Epoch 数"
      - key: stop_epoch
        type: int
        required: false
        layer: common
        conditional_required: true
        condition: "max_train_epochs > 0"
        label: "停止 Epoch"
        help: "在此 epoch 保存后停止"
      - key: optimizer_type
        type: enum
        required: false
        layer: common
        default: "CAME"
        choices:
          - "AdamW"
          - "AdamW8bit"
          - "Lion"
          - "CAME"
          - "Prodigy"
          - "Prodigy_Adv"
          - "Adopt_Adv"
          - "Adafactor"
          - "RAdamScheduleFree"
          - "AdamWScheduleFree"
          - "SGDScheduleFree"
          - "DAdaptAdam"
          - "DAdaptSGD"
          - "PagedAdamW"
          - "PagedAdamW8bit"
        label: "优化器"
      - key: optimizer_args
        type: str
        required: false
        layer: common
        label: "优化器参数"
        help: "多个参数用空格分隔，如: weight_decay=0.01 betas=0.9,0.999,0.9999"
      - key: gradient_accumulation_steps
        type: int
        required: false
        layer: common
        default: 1
        label: "梯度累积步数"
      - key: max_grad_norm
        type: float
        required: false
        layer: common
        default: 1.0
        label: "最大梯度范数"
      - key: timestep_sampling
        type: enum
        required: false
        layer: common
        default: "sigmoid"
        choices: ["sigmoid", "uniform", "sigmoid_shifted"]
        label: "时间步采样策略"
      - key: discrete_flow_shift
        type: float
        required: false
        layer: common
        default: 1.0
        label: "离散流移位"
      - key: sigmoid_bias
        type: float
        required: false
        layer: common
        default: 0.0
        label: "Sigmoid 偏置"

  - name: data
    label: "数据"
    fields:
      - key: datasets
        type: dataset_ref
        required: true
        layer: common
        label: "输入数据集"
      - key: use_shuffled_caption_variants
        type: bool
        required: false
        layer: common
        default: true
        label: "使用打乱的 Caption 变体"
      - key: caption_dropout_rate
        type: float
        required: false
        layer: common
        default: 0.03
        label: "Caption Dropout 率"
      - key: caption_extension
        type: str
        required: false
        layer: common
        default: ".txt"
        label: "Caption 扩展名"
      - key: keep_tokens
        type: int
        required: false
        layer: common
        default: 3
        label: "保留 Token 数"
      - key: cache_llm_adapter_outputs
        type: bool
        required: false
        layer: common
        default: true
        label: "缓存 LLM Adapter 输出"
      - key: network_train_unet_only
        type: bool
        required: false
        layer: common
        default: true
        label: "仅训练 UNet"
        help: "缓存 TE 输出时必须开启"

  - name: checkpoint
    label: "Checkpoint 衔接"
    fields:
      - key: network_weights
        type: checkpoint_ref
        required: false
        layer: common
        conditional_required: true
        condition: "has_upstream_train == true"
        label: "权重初始化"
      - key: dim_from_weights
        type: bool
        required: false
        layer: common
        default: false
        hidden: true

  - name: output
    label: "输出"
    fields:
      - key: output_name
        type: str
        required: false
        layer: common
        default: "anima_lora"
        label: "输出名称"
      - key: save_every_n_epochs
        type: int
        required: false
        layer: common
        label: "每N个Epoch保存"
      - key: checkpointing_epochs
        type: int
        required: false
        layer: common
        label: "可恢复检查点间隔"

  - name: performance
    label: "性能"
    collapsed: true
    fields:
      - key: gradient_checkpointing
        type: bool
        required: false
        layer: common
        default: false
        label: "梯度检查点"
      - key: unsloth_offload_checkpointing
        type: bool
        required: false
        layer: common
        default: false
        label: "Unsloth 卸载检查点"
      - key: blocks_to_swap
        type: int
        required: false
        layer: common
        default: 0
        label: "Block Swap 数量"
      - key: torch_compile
        type: bool
        required: false
        layer: common
        default: true
        label: "torch.compile 加速"
      - key: seed
        type: int
        required: false
        layer: common
        label: "随机种子"
