type: train_method
method: locon
label: "LoCON"
description: "Low-Rank Convolution"
base_type: lycoris

groups:
  - name: architecture
    label: "架构"
    fields:
      - key: network_type
        type: str
        layer: method
        required: true
        default: "locon"
        hidden: true
      - key: network_dim
        type: int
        layer: method
        required: true
        default: 16
        label: "Network Dim"
      - key: network_alpha
        type: int
        layer: method
        required: true
        default: 8
        label: "Network Alpha"
      - key: conv_dim
        type: int
        layer: method
        required: false
        default: 8
        label: "Conv Dim"
      - key: conv_alpha
        type: int
        layer: method
        required: false
        default: 4
        label: "Conv Alpha"
      - key: use_tucker
        type: bool
        layer: method
        required: false
        default: true
        label: "Use Tucker"
      - key: use_scalar
        type: bool
        layer: method
        required: false
        default: false
        label: "Use Scalar"
      - key: weight_decompose
        type: bool
        layer: method
        required: false
        default: false
        label: "Weight Decompose (DoRA)"
