<h2 style='margin:0 0 10px 0; font-size:17px;'>LOCON</h2>
<p>Tucker 분해를 지원하는 향상된 LoRA.</p>
<p><b>선형 레이어</b>: 표준 LoRA와 동일 &mdash; ΔW = up @ down &times; scale</p>
<p><b>Conv2d 레이어</b>: 커널 크기 &gt; 1인 경우 Tucker 코어 텐서 <code>lora_mid</code>를 추가하여 합성곱을 더 효율적으로 분해합니다.</p>
<p>ComfyUI의 LyCORIS 로더와 호환됩니다. <code>use_tucker=true</code>로 설정하여 Conv 레이어에 Tucker 분해를 활성화하세요.</p>
